<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>annadata-vad-dt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: transparent;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .pill {
      background: rgba(20, 20, 20, 0.90);
      border-radius: 20px;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #555; transition: background 0.2s; flex-shrink: 0;
    }
    .dot.active { background: #ff4444; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .text {
      color: #ccc; font-size: 12px; max-width: 140px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    select {
      background: rgba(255,255,255,0.08); color: #eee;
      border: 1px solid rgba(255,255,255,0.12); border-radius: 6px;
      padding: 3px 6px; font-size: 11px; outline: none; cursor: pointer;
      -webkit-app-region: no-drag;
    }
    select:hover { background: rgba(255,255,255,0.15); }
    /* Grey out disabled options */
    option.unavailable { color: #555; }
    option.available { color: #eee; }
  </style>
</head>
<body>
  <div class="pill">
    <div class="dot" id="dot"></div>
    <div class="text" id="text">Ready</div>
    <select id="langSelect" title="Language"></select>
  </div>

  <!-- Load Emscripten-generated whisper.js — exposes global WhisperModule factory -->
  <script src="../dist/wasm/whisper.js"></script>

  <script>
    const dot = document.getElementById('dot');
    const textEl = document.getElementById('text');
    const langSelect = document.getElementById('langSelect');

    // ── Whisper WASM state ──
    let whisperModule = null;
    let whisperContextId = null;
    let loadedModelFile = null; // filename currently in WASM FS

    // ── Audio state ──
    let mediaStream = null;
    let audioContext = null;
    let processor = null;
    let audioBuffer = [];
    let totalSamples = 0;
    let chunkTimer = null;
    const CHUNK_INTERVAL_MS = 3000;

    // ── All lang options (populated from main) ──
    let allLangOptions = {};

    // ── Load whisper.wasm ──
    async function loadWhisperModule() {
      if (whisperModule) return whisperModule;
      if (typeof WhisperModule !== 'function') {
        throw new Error('WhisperModule global not found — whisper.js failed to load');
      }
      whisperModule = await WhisperModule({
        print: (t) => console.log('[whisper.wasm]', t),
        printErr: (t) => console.warn('[whisper.wasm]', t),
      });
      try { whisperModule.FS.mkdir('/models'); } catch (_) {}
      console.log('✅ whisper.wasm loaded');
      return whisperModule;
    }

    // ── Load a model file into WASM FS and init context ──
    async function ensureModelLoaded(modelUrl) {
      const m = await loadWhisperModule();
      const filename = modelUrl.split('/').pop();
      const fsPath = '/models/' + filename;

      // Already loaded this exact file?
      if (loadedModelFile === filename && whisperContextId !== null) return;

      // Write into WASM FS if not there
      try { m.FS.stat(fsPath); } catch (_) {
        const localPath = await window.stt.getModelPath(modelUrl);
        if (!localPath) throw new Error('Model not on disk');
        textEl.textContent = 'Loading model...';
        // Read file via IPC (Node.js fs in main process) — avoids file:// fetch issues
        const buf = await window.stt.readModelFile(localPath);
        if (!buf) throw new Error('Failed to read model file');
        const data = new Uint8Array(buf);
        m.FS.writeFile(fsPath, data);
      }

      // Free old context
      if (whisperContextId !== null) {
        m.free_context(whisperContextId);
        whisperContextId = null;
      }

      const nThreads = Math.min(navigator.hardwareConcurrency || 4, 8);
      const jsonStr = m.init(fsPath, false, nThreads);
      if (!jsonStr || jsonStr === '{}') throw new Error('Failed to init whisper context');
      whisperContextId = JSON.parse(jsonStr).contextId;
      loadedModelFile = filename;
      textEl.textContent = 'Ready';
    }

    // ── Ensure model for a language is available, download if needed ──
    async function ensureLanguageReady(langCode) {
      const lang = allLangOptions[langCode];
      if (!lang || !lang.url) return false;

      const downloaded = await window.stt.isModelDownloaded(lang.url);
      if (!downloaded) {
        textEl.textContent = 'Downloading model...';
        const result = await window.stt.downloadModel(lang.url);
        if (!result.success) {
          textEl.textContent = 'Download failed';
          console.error('Download failed:', result.error);
          return false;
        }
      }

      await ensureModelLoaded(lang.url);
      return true;
    }

    // ── Transcribe buffered audio ──
    async function transcribeBuffer(isFinal) {
      if (totalSamples < 16000 || whisperContextId === null) return;

      const m = whisperModule;
      const lang = langSelect.value || 'en';

      const merged = new Float32Array(totalSamples);
      let offset = 0;
      for (const chunk of audioBuffer) { merged.set(chunk, offset); offset += chunk.length; }

      const nSamples = merged.length;
      const ptr = m.wasm_malloc(nSamples * 4);
      if (!ptr) return;

      try {
        new Float32Array(m.HEAPU8.buffer, ptr, nSamples).set(merged);
        const nThreads = Math.min(navigator.hardwareConcurrency || 4, 8);
        const jsonStr = m.transcribe(
          whisperContextId, ptr, nSamples, nThreads,
          false, lang, false, false, false, 1, 1, 0.0, '', false
        );
        if (jsonStr && jsonStr !== '{}') {
          const text = (JSON.parse(jsonStr).text || '').trim();
          if (text) {
            if (isFinal) window.stt.sendFinal(text);
            else window.stt.sendInterim(text);
          }
        }
      } catch (err) {
        console.error('Transcription error:', err);
      } finally {
        m.wasm_free(ptr);
      }
    }

    // ── Mic ──
    async function startMic() {
      audioBuffer = [];
      totalSamples = 0;
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, sampleRate: 16000, echoCancellation: true, noiseSuppression: true }
        });
        audioContext = new AudioContext({ sampleRate: 16000 });
        const source = audioContext.createMediaStreamSource(mediaStream);
        processor = audioContext.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = (e) => {
          const f32 = new Float32Array(e.inputBuffer.getChannelData(0));
          audioBuffer.push(f32);
          totalSamples += f32.length;
        };
        source.connect(processor);
        processor.connect(audioContext.destination);
        chunkTimer = setInterval(() => transcribeBuffer(false), CHUNK_INTERVAL_MS);
      } catch (err) {
        textEl.textContent = 'Mic error';
        console.error('Mic error:', err);
      }
    }

    async function stopMic() {
      if (chunkTimer) { clearInterval(chunkTimer); chunkTimer = null; }
      if (processor) { processor.disconnect(); processor = null; }
      if (audioContext) { audioContext.close(); audioContext = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
      await transcribeBuffer(true);
      audioBuffer = [];
      totalSamples = 0;
    }

    // ── Language dropdown ──
    async function initUI() {
      allLangOptions = await window.stt.getLangOptions();
      langSelect.innerHTML = '';

      for (const [code, info] of Object.entries(allLangOptions)) {
        const opt = document.createElement('option');
        opt.value = code;
        opt.textContent = info.name;
        if (!info.url) {
          opt.className = 'unavailable';
          opt.disabled = true;
        } else {
          opt.className = 'available';
        }
        langSelect.appendChild(opt);
      }

      const savedLang = await window.stt.getLanguage();
      langSelect.value = savedLang || 'en';

      // Pre-load model for current language
      const currentLang = allLangOptions[langSelect.value];
      if (currentLang && currentLang.url) {
        ensureLanguageReady(langSelect.value).catch(console.error);
      }
    }

    langSelect.addEventListener('change', async () => {
      const code = langSelect.value;
      window.stt.setLanguage(code);
      const lang = allLangOptions[code];
      if (lang && lang.url) {
        await ensureLanguageReady(code);
      }
    });

    window.stt.onDownloadProgress((data) => {
      textEl.textContent = `Downloading ${data.percentage}%`;
    });

    // ── Recording events ──
    window.stt.onRecordingState((active) => {
      dot.classList.toggle('active', active);
      if (active) {
        textEl.textContent = '';
        startMic();
      } else {
        stopMic().then(() => { textEl.textContent = 'Ready'; });
      }
    });

    window.stt.onTranscript(({ text, isFinal }) => {
      textEl.textContent = text;
      textEl.style.color = isFinal ? '#fff' : '#aaa';
    });

    window.stt.onSttError((msg) => {
      textEl.textContent = msg;
    });

    // Init
    initUI();
  </script>
</body>
</html>
