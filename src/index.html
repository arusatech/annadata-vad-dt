<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>annadata-vad-dt</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <!-- Record button -->
    <button id="recBtn" class="icon-btn" title="Start recording (Ctrl+Shift+Space)">
      <svg id="recIconMic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="1" width="6" height="12" rx="3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
      <svg id="recIconStop" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>

    <!-- Center: waveform + status / history -->
    <div id="centerCol">
      <div id="liveView">
        <canvas id="waveCanvas" width="320" height="36"></canvas>
        <div id="textOverlay">Ready</div>
      </div>
      <div id="historyView" style="display:none">
        <div id="historyList"></div>
      </div>
    </div>

    <!-- History toggle -->
    <button id="historyBtn" class="icon-btn" title="History">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    </button>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
